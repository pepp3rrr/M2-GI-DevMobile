<ion-header>
  <ion-toolbar>
    <ion-title>Join a room</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()">Close</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Room ID input -->
  <ion-item>
    <ion-label position="floating">Room ID</ion-label>
    <ion-input [(ngModel)]="roomId"></ion-input>
  </ion-item>

  <!-- Error message -->
  @if (error) {
    <p style="color:red; margin-top: 10px;">
      {{ error }}
    </p>
  }

  <!-- Join button -->
  <ion-button expand="block" (click)="join()" style="margin-top: 16px;">
    Join
  </ion-button>

</ion-content>
