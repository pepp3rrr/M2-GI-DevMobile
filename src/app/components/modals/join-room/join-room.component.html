<ion-header>
  <ion-toolbar>
    <ion-title>Rejoindre une room</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()">Fermer</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-label position="floating">Username</ion-label>
    <ion-input [(ngModel)]="username"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Room ID</ion-label>
    <ion-input [(ngModel)]="roomId"></ion-input>
  </ion-item>

  <p style="color:red" *ngIf="error">{{ error }}</p>

  <ion-button expand="block" (click)="join()">
    Rejoindre
  </ion-button>

</ion-content>
