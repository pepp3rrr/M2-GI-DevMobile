<ion-header>
  <ion-toolbar>
    <ion-title>{{ quiz.title }}</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="close()">Close</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <p class="quiz-description">{{ quiz.description }}</p>

  <ion-list lines="none">

    @for (q of questions; track q.id; let i = $index) {
      <ion-card class="question-card">

        <ion-card-header>
          <ion-card-title>
            Question {{ i + 1 }}
          </ion-card-title>
          <ion-card-subtitle>
            {{ q.text }}
          </ion-card-subtitle>
        </ion-card-header>

        <ion-card-content>

          @for (choice of q.choices; track choice.id) {
            <div 
              class="choice"
              [class.correct]="choice.id === q.correctChoiceId"
            >
              <ion-icon 
                *ngIf="choice.id === q.correctChoiceId" 
                name="checkmark-circle"
              ></ion-icon>

              {{ choice.text }}
            </div>
          }

        </ion-card-content>

      </ion-card>
    }

  </ion-list>

</ion-content>
